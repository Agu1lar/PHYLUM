# Temporary location for CI workflow. Move to .github/workflows/ci.yml to enable on GitHub.
# Use the provided helper script apply_ci.ps1 to move this into place.

name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  tests:
    name: Tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.11'
            playwright: true
          - os: windows-latest
            python-version: '3.11'
            playwright: true
          - os: macos-latest
            python-version: '3.11'
            playwright: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browsers
        if: ${{ matrix.playwright == true }}
        run: |
          python -m playwright install --with-deps

      - name: Run tests
        run: |
          python -m pytest -q
        env:
          CI: true
