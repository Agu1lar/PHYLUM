[pytest]
asyncio_mode = auto
python_files = test_*.py
testpaths = tests
pythonpath = core tools agents nodes models providers safety memory execution persistence
filterwarnings = ignore::DeprecationWarning

markers =
    windows: mark test as Windows-only
    requires_pwsh: test requires pwsh/powershell
    requires_playwright: test requires playwright and browsers
    architecture: architectural invariants and layer boundary contract tests (CI gate)
    golden: local golden tasks with fixtures and expected outcomes
    benchmark: domain automation benchmarks (filesystem, office, browser, etc.)

addopts = -q
